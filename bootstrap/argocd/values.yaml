# Helm values for ArgoCD
# Install with:
#   helm repo add argo https://argoproj.github.io/argo-helm
#   helm install argocd argo/argo-cd -n argocd -f bootstrap/argocd/values.yaml

server:
  service:
    type: NodePort
    nodePortHttp: 30080
    nodePortHttps: 30443

configs:
  params:
    # Disable TLS on the argocd-server for local access (behind a proxy or NodePort)
    server.insecure: true
