{{- if .Values.productpage.secret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: productpage-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: productpage-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.productpage.secret.remoteKey | quote }}
        property: password
{{- end }}
